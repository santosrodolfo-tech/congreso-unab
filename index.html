<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IX Congreso Internacional – Gestión Estratégica Digital | UNAB</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── VARIABLES ─────────────────────────────────────────── */
    :root {
      --bg-deep: #020d18; --bg-card: rgba(5,30,55,0.7);
      --teal: #00d4b4; --teal-bright: #00ffea; --cyan: #00b4d8;
      --green-neon: #39ff6e; --yellow-gold: #f0c040;
      --white: #f0faff; --muted: #7ab8c8;
      --border: rgba(0,212,180,0.2);
    }

    /* ── RESET & BASE ──────────────────────────────────────── */
    * { margin:0; padding:0; box-sizing:border-box; max-width:100%; }
    html, body { scroll-behavior:smooth; font-family:'Rajdhani',sans-serif; background:var(--bg-deep); color:var(--white); overflow-x:hidden; max-width:100vw; }
    #root { min-height:100vh; }
    table { table-layout:fixed; word-break:break-word; }

    /* ── PARTICLES ─────────────────────────────────────────── */
    .particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
    .particle { position:absolute; border-radius:50%; background:var(--teal); animation:float linear infinite; opacity:0; }
    @keyframes float {
      0%   { transform:translateY(100vh) translateX(0); opacity:0; }
      10%  { opacity:0.6; }
      90%  { opacity:0.3; }
      100% { transform:translateY(-10vh) translateX(60px); opacity:0; }
    }

    /* ── NAV ───────────────────────────────────────────────── */
    nav { position:fixed; top:0; left:0; width:100%; z-index:100; background:rgba(2,13,24,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; flex-direction:column; }
    .nav-top { display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:70px; }
    .nav-brand { display:flex; align-items:center; }
    .nav-logo { height:52px; width:auto; object-fit:contain; }
    .nav-links { display:flex; gap:2rem; list-style:none; }
    .nav-links a { color:var(--muted); text-decoration:none; font-size:0.85rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; transition:color 0.2s; }
    .nav-links a:hover { color:var(--teal-bright); }
    .nav-hamburger { display:none; flex-direction:column; justify-content:center; gap:5px; cursor:pointer; padding:8px 10px; background:transparent; border:1px solid rgba(0,212,180,0.5); border-radius:4px; flex-shrink:0; }

    /* ── TICKER ────────────────────────────────────────────── */
    .nav-ticker { background:linear-gradient(90deg,rgba(0,212,180,0.12),rgba(0,180,216,0.08)); border-top:1px solid rgba(0,212,180,0.15); border-bottom:1px solid rgba(0,212,180,0.15); padding:0.45rem 0; overflow:hidden; white-space:nowrap; }
    .nav-ticker-inner { display:inline-block; animation:ticker 55s linear infinite; font-family:'Orbitron',sans-serif; font-size:0.68rem; font-weight:600; letter-spacing:0.12em; color:var(--teal); text-transform:uppercase; padding-right:6rem; }
    .nav-ticker-inner span { color:var(--yellow-gold); }
    @keyframes ticker { 0% { transform:translateX(100vw); } 100% { transform:translateX(-100%); } }

    /* ── HERO ──────────────────────────────────────────────── */
    .hero { position:relative; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; overflow:hidden; padding:120px 2rem 2rem; }
    .hero-bg { position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(0,180,216,0.12) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 20% 60%,rgba(0,255,100,0.07) 0%,transparent 60%),linear-gradient(180deg,#020d18 0%,#041223 50%,#020d18 100%); }
    .hero-grid { position:absolute; inset:0; opacity:0.08; background-image:linear-gradient(rgba(0,212,180,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,180,0.4) 1px,transparent 1px); background-size:60px 60px; }
    .hero-content { position:relative; z-index:2; max-width:900px; }
    .hero-badge { display:inline-block; border:1px solid var(--teal); color:var(--teal); font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.2em; padding:0.4rem 1.2rem; border-radius:2px; margin-bottom:2rem; text-transform:uppercase; background:rgba(0,212,180,0.06); animation:fadeInDown 0.8s ease forwards; }
    .hero-title { font-family:'Orbitron',sans-serif; font-size:clamp(2.5rem,7vw,5.5rem); font-weight:900; line-height:1.05; text-transform:uppercase; letter-spacing:-0.02em; animation:fadeInUp 0.9s 0.2s ease both; }
    .hero-title .line1, .hero-title .line2 { color:var(--white); display:block; }
    .hero-title .line3 { color:var(--yellow-gold); display:block; text-shadow:0 0 40px rgba(240,192,64,0.5); }
    .hero-sub { margin:1.5rem 0 2.5rem; color:var(--muted); font-size:1.1rem; font-weight:400; letter-spacing:0.08em; text-transform:uppercase; animation:fadeInUp 0.9s 0.4s ease both; }
    .hero-meta { display:flex; justify-content:center; gap:2.5rem; flex-wrap:wrap; margin-bottom:2.5rem; animation:fadeInUp 0.9s 0.6s ease both; }
    .meta-item { display:flex; align-items:center; gap:0.5rem; font-size:1rem; font-weight:600; color:var(--white); }
    .meta-icon { color:var(--teal); font-size:1.1rem; }
    .hero-cta { display:inline-block; background:linear-gradient(135deg,var(--teal),var(--cyan)); color:#020d18; font-family:'Orbitron',sans-serif; font-size:0.8rem; font-weight:700; padding:1rem 2.5rem; border-radius:2px; text-decoration:none; letter-spacing:0.15em; text-transform:uppercase; box-shadow:0 0 30px rgba(0,212,180,0.4); transition:all 0.3s; border:none; cursor:pointer; animation:fadeInUp 0.9s 0.8s ease both; }
    .hero-cta:hover { transform:translateY(-3px); box-shadow:0 0 50px rgba(0,212,180,0.6); }
    .hero-price { display:block; margin-top:0.8rem; font-size:0.85rem; color:var(--muted); }

    /* ── SECTIONS & LAYOUT ─────────────────────────────────── */
    section { position:relative; z-index:1; padding:5rem 2rem; }
    .container { max-width:1100px; margin:0 auto; }
    .section-label { font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.25em; color:var(--teal); text-transform:uppercase; margin-bottom:0.75rem; }
    .section-title { font-family:'Orbitron',sans-serif; font-size:clamp(1.8rem,4vw,2.8rem); font-weight:700; color:var(--white); line-height:1.2; margin-bottom:1.5rem; }
    .section-title span { color:var(--teal); }
    .divider { width:60px; height:3px; background:linear-gradient(90deg,var(--teal),var(--green-neon)); margin-bottom:2.5rem; }

    /* ── ABOUT ─────────────────────────────────────────────── */
    .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:3rem; align-items:center; }
    .about-text p { color:rgba(240,250,255,0.75); font-size:1.05rem; line-height:1.8; margin-bottom:1.2rem; }
    .about-text p strong { color:var(--teal); font-weight:600; }
    .about-card { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:2rem; backdrop-filter:blur(10px); }
    .info-row { display:flex; gap:1rem; align-items:flex-start; padding:0.9rem 0; border-bottom:1px solid rgba(0,212,180,0.1); }
    .info-row:last-child { border-bottom:none; }
    .info-icon { color:var(--teal); font-size:1.3rem; flex-shrink:0; margin-top:2px; }
    .info-label { font-size:0.75rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
    .info-value { font-size:1rem; font-weight:600; color:var(--white); margin-top:0.2rem; }

    /* ── OBJECTIVES ────────────────────────────────────────── */
    .obj-section { background:linear-gradient(180deg,transparent,rgba(0,30,50,0.5),transparent); }
    .obj-general { background:var(--bg-card); border:1px solid var(--border); border-left:4px solid var(--teal); border-radius:4px; padding:2rem; margin-bottom:2.5rem; backdrop-filter:blur(10px); }
    .obj-general-label { font-family:'Orbitron',sans-serif; font-size:0.6rem; letter-spacing:0.2em; color:var(--teal); text-transform:uppercase; margin-bottom:0.75rem; }
    .obj-general p { color:rgba(240,250,255,0.8); font-size:1rem; line-height:1.75; }
    .obj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.5rem; }
    .obj-card { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:1.5rem; backdrop-filter:blur(8px); transition:border-color 0.3s,transform 0.3s; display:flex; gap:1rem; }
    .obj-card:hover { border-color:var(--teal); transform:translateY(-4px); }
    .obj-number { font-family:'Orbitron',sans-serif; font-size:2rem; font-weight:900; color:rgba(0,212,180,0.2); flex-shrink:0; line-height:1; }
    .obj-card p { color:rgba(240,250,255,0.75); font-size:0.95rem; line-height:1.7; }

    /* ── PROGRAM ───────────────────────────────────────────── */
    .program-intro { color:rgba(240,250,255,0.7); font-size:1rem; margin-bottom:2.5rem; line-height:1.7; }
    .program-block { margin-bottom:2rem; }
    .block-header { display:flex; align-items:center; gap:1rem; margin-bottom:1rem; flex-wrap:wrap; }
    .block-dot { width:12px; height:12px; border-radius:50%; background:var(--teal); box-shadow:0 0 12px var(--teal); flex-shrink:0; }
    .block-title { font-family:'Orbitron',sans-serif; font-size:0.8rem; letter-spacing:0.15em; color:var(--teal); text-transform:uppercase; }
    .block-time { margin-left:auto; font-size:0.85rem; color:var(--yellow-gold); font-weight:600; flex-shrink:0; }
    .schedule-table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    .schedule-table th { background:rgba(0,212,180,0.1); color:var(--teal); font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; padding:0.75rem 1rem; text-align:left; border-bottom:1px solid var(--border); }
    .schedule-table td { padding:0.75rem 1rem; border-bottom:1px solid rgba(0,212,180,0.07); color:rgba(240,250,255,0.8); vertical-align:top; }
    .schedule-table tr:hover td { background:rgba(0,212,180,0.04); }
    .td-time { color:var(--yellow-gold); font-weight:600; white-space:nowrap; }
    .td-resp { color:var(--teal); font-size:0.85rem; }
    .tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .tab-btn { padding:0.5rem 1.2rem; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:0.85rem; font-weight:600; letter-spacing:0.05em; cursor:pointer; border-radius:2px; transition:all 0.2s; text-transform:uppercase; }
    .tab-btn.active { background:rgba(0,212,180,0.15); border-color:var(--teal); color:var(--teal); }
    .tab-btn:hover:not(.active) { border-color:rgba(0,212,180,0.4); color:var(--white); }

    /* ── VENUE ─────────────────────────────────────────────── */
    .venue-grid { display:grid; grid-template-columns:1fr 1fr; gap:3rem; align-items:start; }
    .venue-photo { width:100%; height:280px; object-fit:cover; border-radius:4px; border:1px solid var(--border); display:block; }
    .venue-map-btn { display:flex; align-items:center; justify-content:center; gap:0.6rem; width:100%; margin-top:1rem; background:linear-gradient(135deg,rgba(0,212,180,0.15),rgba(0,180,216,0.1)); border:1px solid var(--teal); color:var(--teal); font-family:'Orbitron',sans-serif; font-size:0.7rem; font-weight:700; letter-spacing:0.12em; padding:0.85rem 1.5rem; border-radius:2px; text-decoration:none; text-transform:uppercase; transition:all 0.3s; }
    .venue-map-btn:hover { background:linear-gradient(135deg,rgba(0,212,180,0.3),rgba(0,180,216,0.2)); box-shadow:0 0 20px rgba(0,212,180,0.3); transform:translateY(-2px); }
    .venue-details { display:flex; flex-direction:column; gap:1.5rem; }
    .venue-card { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:1.5rem; backdrop-filter:blur(8px); }
    .venue-card h3 { font-family:'Orbitron',sans-serif; font-size:0.75rem; letter-spacing:0.15em; color:var(--teal); text-transform:uppercase; margin-bottom:0.75rem; }
    .venue-card p { color:rgba(240,250,255,0.75); font-size:0.95rem; line-height:1.7; }
    .venue-tags { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.75rem; }
    .venue-tag { background:rgba(0,212,180,0.1); border:1px solid rgba(0,212,180,0.2); color:var(--teal); font-size:0.78rem; padding:0.3rem 0.75rem; border-radius:2px; font-weight:600; }

    /* ── CAROUSEL 3D ───────────────────────────────────────── */
    .carousel-section { position:relative; z-index:1; padding:5rem 2rem; background:linear-gradient(180deg,transparent,rgba(0,15,35,0.6),transparent); }
    .carousel-3d-wrapper { position:relative; width:100%; height:520px; display:flex; align-items:center; justify-content:center; perspective:1200px; overflow:hidden; }
    .carousel-3d-track { position:relative; width:100%; height:100%; transform-style:preserve-3d; }
    .carousel-3d-slide { position:absolute; width:280px; height:420px; top:50%; left:50%; margin-top:-210px; margin-left:-140px; border-radius:10px; overflow:hidden; cursor:pointer; transition:all 0.6s cubic-bezier(0.25,0.46,0.45,0.94); box-shadow:0 20px 60px rgba(0,0,0,0.5); border:1px solid rgba(0,212,180,0.2); user-select:none; }
    .carousel-3d-slide img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
    .carousel-3d-slide.is-active { border-color:var(--teal); box-shadow:0 0 60px rgba(0,212,180,0.35),0 30px 80px rgba(0,0,0,0.6); z-index:10; }
    .carousel-3d-nav { display:flex; justify-content:center; align-items:center; gap:1.5rem; margin-top:2rem; }
    .carousel-3d-btn { background:rgba(0,212,180,0.1); border:1px solid var(--teal); color:var(--teal); font-size:1.3rem; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; }
    .carousel-3d-btn:hover { background:rgba(0,212,180,0.3); box-shadow:0 0 20px rgba(0,212,180,0.4); transform:scale(1.1); }
    .carousel-3d-dots { display:flex; gap:0.5rem; align-items:center; }
    .carousel-3d-dot { width:7px; height:7px; border-radius:50%; background:rgba(0,212,180,0.3); border:1px solid rgba(0,212,180,0.4); cursor:pointer; transition:all 0.2s; }
    .carousel-3d-dot.active { background:var(--teal); box-shadow:0 0 8px var(--teal); transform:scale(1.4); }

    /* ── CONTACT ───────────────────────────────────────────── */
    .contact-section { background:linear-gradient(180deg,transparent,rgba(0,25,45,0.7)); }
    .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:3rem; }
    .contact-info h3 { font-family:'Orbitron',sans-serif; font-size:1rem; color:var(--white); margin-bottom:1rem; }
    .contact-info p { color:rgba(240,250,255,0.7); font-size:0.95rem; line-height:1.8; }
    .org-list { list-style:none; margin-top:1.5rem; display:flex; flex-direction:column; gap:0.75rem; }
    .org-list li { display:flex; align-items:center; gap:0.75rem; color:rgba(240,250,255,0.7); font-size:0.95rem; }
    .org-list li::before { content:"▸"; color:var(--teal); font-size:0.8rem; }
    .conclusion-box { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:2rem; backdrop-filter:blur(10px); }
    .conclusion-box blockquote { font-family:'Rajdhani',sans-serif; font-size:1.4rem; font-weight:600; color:var(--teal-bright); line-height:1.5; font-style:italic; margin-bottom:1.5rem; border-left:3px solid var(--teal); padding-left:1.25rem; }
    .conclusion-box p { color:rgba(240,250,255,0.7); font-size:0.95rem; line-height:1.75; }
    .invest-badge { background:linear-gradient(135deg,rgba(240,192,64,0.15),rgba(240,192,64,0.05)); border:1px solid var(--yellow-gold); color:var(--yellow-gold); font-family:'Orbitron',sans-serif; font-size:0.85rem; font-weight:700; padding:0.75rem 1.5rem; border-radius:2px; margin-top:1.5rem; letter-spacing:0.1em; display:block; text-align:center; }

    /* ── FOOTER ────────────────────────────────────────────── */
    footer { background:rgba(2,10,20,0.9); border-top:1px solid var(--border); padding:2.5rem 2rem; text-align:center; position:relative; z-index:1; }
    footer p { color:var(--muted); font-size:0.85rem; }
    footer strong { color:var(--teal); }

    /* ── ANIMATIONS ────────────────────────────────────────── */
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInUp   { from{opacity:0;transform:translateY(30px)}  to{opacity:1;transform:translateY(0)} }
    .fade-in { opacity:0; transform:translateY(30px); transition:opacity 0.7s ease,transform 0.7s ease; }
    .fade-in.visible { opacity:1; transform:translateY(0); }


    /* ── PONENTES ──────────────────────────────────────────── */
    .ponentes-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }
    .ponente-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
      aspect-ratio: 3/4;
    }
    .ponente-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 40px rgba(0,212,180,0.25);
      border-color: var(--teal);
    }
    .ponente-card img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .ponente-card:hover img { transform: scale(1.04); }


    /* Modal */
    .ponente-modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(2,13,24,0.95);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeInModal 0.25s ease;
    }
    @keyframes fadeInModal { from{opacity:0} to{opacity:1} }
    .ponente-modal-img-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100vh;
      overflow: hidden;
    }
    .ponente-modal-img-wrap img {
      max-height: 88vh; max-width: 80vw;
      object-fit: contain; display: block;
      border-radius: 8px;
      border: 1px solid var(--teal);
      box-shadow: 0 0 60px rgba(0,212,180,0.25);
      transition: transform 0.2s ease;
      cursor: grab;
      user-select: none;
    }
    .ponente-modal-img-wrap img:active { cursor: grabbing; }
    /* Top controls bar */
    .modal-controls {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.5rem; z-index: 201;
      background: rgba(2,13,24,0.85);
      border: 1px solid var(--border);
      border-radius: 40px; padding: 0.4rem 0.8rem;
      backdrop-filter: blur(8px);
    }
    .modal-btn {
      background: transparent; border: none;
      color: var(--teal); font-size: 1.1rem;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .modal-btn:hover { background: rgba(0,212,180,0.15); }
    .modal-btn.close-btn { color: var(--muted); }
    .modal-btn.close-btn:hover { background: rgba(255,100,100,0.15); color: #ff6b6b; }
    .modal-zoom-label {
      font-family: 'Orbitron', sans-serif; font-size: 0.6rem;
      color: var(--muted); display: flex; align-items: center;
      padding: 0 0.4rem; letter-spacing: 0.05em; min-width: 42px;
      justify-content: center;
    }
    /* Side nav arrows */
    .modal-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(0,212,180,0.1);
      border: 1px solid var(--teal);
      color: var(--teal); font-size: 1.8rem;
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; z-index: 201;
    }
    .modal-nav:hover { background: rgba(0,212,180,0.25); box-shadow: 0 0 20px rgba(0,212,180,0.3); }
    .modal-nav.prev { left: 1.5rem; }
    .modal-nav.next { right: 1.5rem; }
    .modal-counter {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif; font-size: 0.65rem;
      color: var(--muted); letter-spacing: 0.1em;
      background: rgba(2,13,24,0.7); padding: 0.3rem 1rem;
      border-radius: 20px; border: 1px solid var(--border);
      z-index: 201;
    }

    @media (max-width: 768px) {
      .ponentes-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
    }

    /* ── PATROCINADORES ────────────────────────────────────── */
    .sponsors-section { position:relative; z-index:1; padding:4rem 2rem; background:linear-gradient(180deg,transparent,rgba(0,20,40,0.5),transparent); }
    .sponsors-controls {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.25rem; justify-content: center;
    }

    </div>
  );

function useFadeIn() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, {threshold:0.1});
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

function FadeIn({children, style}) {
  const ref = useFadeIn();
  return <div ref={ref} className="fade-in" style={style}>{children}</div>;
}

function Ponentes() {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [zoom, setZoom] = useState(1);
  const [dragging, setDragging] = useState(false);
  const [offset, setOffset] = useState({x:0, y:0});
  const [dragStart, setDragStart] = useState({x:0, y:0});

  const ponentes = [
    { src: 'imagenes/ponentes_1.jpeg', num: 'Ponente 01' },
    { src: 'imagenes/ponentes_2.jpeg', num: 'Ponente 02' },
    { src: 'imagenes/ponentes_3.jpeg', num: 'Ponente 03' },
    { src: 'imagenes/ponentes_4.jpeg', num: 'Ponente 04' },
  ];
  const total = ponentes.length;

  const openModal = (i) => { setSelectedIdx(i); setZoom(1); setOffset({x:0,y:0}); };
  const closeModal = () => { setSelectedIdx(null); setZoom(1); setOffset({x:0,y:0}); };
  const prev = (e) => { e.stopPropagation(); setSelectedIdx(i => (i-1+total)%total); setZoom(1); setOffset({x:0,y:0}); };
  const next = (e) => { e.stopPropagation(); setSelectedIdx(i => (i+1)%total); setZoom(1); setOffset({x:0,y:0}); };
  const zoomIn  = (e) => { e.stopPropagation(); setZoom(z => Math.min(z+0.5, 4)); };
  const zoomOut = (e) => { e.stopPropagation(); setZoom(z => { const nz=Math.max(z-0.5,1); if(nz===1) setOffset({x:0,y:0}); return nz; }); };
  const resetZoom = (e) => { e.stopPropagation(); setZoom(1); setOffset({x:0,y:0}); };

  const onMouseDown = (e) => { if(zoom>1){ setDragging(true); setDragStart({x:e.clientX-offset.x, y:e.clientY-offset.y}); e.preventDefault(); }};
  const onMouseMove = (e) => { if(dragging) setOffset({x:e.clientX-dragStart.x, y:e.clientY-dragStart.y}); };
  const onMouseUp   = () => setDragging(false);

  // Touch support
  const onTouchStart = (e) => { if(zoom>1){ setDragging(true); setDragStart({x:e.touches[0].clientX-offset.x, y:e.touches[0].clientY-offset.y}); }};
  const onTouchMove  = (e) => { if(dragging) setOffset({x:e.touches[0].clientX-dragStart.x, y:e.touches[0].clientY-dragStart.y}); };
  const onTouchEnd   = () => setDragging(false);

  // Close with Escape key
  useEffect(() => {
    const handler = (e) => { if(e.key==='Escape') closeModal(); if(e.key==='ArrowLeft' && selectedIdx!==null) setSelectedIdx(i=>(i-1+total)%total); if(e.key==='ArrowRight' && selectedIdx!==null) setSelectedIdx(i=>(i+1)%total); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [selectedIdx]);

  return (
    <section id="ponentes" style={{background:'linear-gradient(180deg,transparent,rgba(0,20,40,0.4),transparent)'}}>
      <div className="container">
        <FadeIn>
          <div className="section-label">// 03</div>
          <h2 className="section-title">Conoce a tus <span>Ponentes</span></h2>
          <div className="divider"/>
        </FadeIn>
        <FadeIn>
          <div className="ponentes-grid">
            {ponentes.map((p, i) => (
              <div key={i} className="ponente-card" onClick={() => openModal(i)}>
                <img src={p.src} alt={p.num} loading="lazy"/>
              </div>
            ))}
          </div>
        </FadeIn>
      </div>

      {/* Modal */}
      {selectedIdx !== null && (
        <div className="ponente-modal-backdrop" onClick={closeModal}>

          {/* Controls bar */}
          <div className="modal-controls" onClick={e=>e.stopPropagation()}>
            <button className="modal-btn" onClick={zoomOut} title="Alejar">－</button>
            <span className="modal-zoom-label">{Math.round(zoom*100)}%</span>
            <button className="modal-btn" onClick={zoomIn} title="Acercar">＋</button>
            <button className="modal-btn" onClick={resetZoom} title="Restablecer">⊡</button>
            <button className="modal-btn close-btn" onClick={closeModal} title="Cerrar">✕</button>
          </div>

          {/* Prev arrow */}
          <button className="modal-nav prev" onClick={prev}>&#8249;</button>

          {/* Image */}
          <div
            className="ponente-modal-img-wrap"
            onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
            onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
            onClick={e=>e.stopPropagation()}
          >
            <img
              src={ponentes[selectedIdx].src}
              alt={ponentes[selectedIdx].num}
              style={{transform:`scale(${zoom}) translate(${offset.x/zoom}px,${offset.y/zoom}px)`}}
              draggable={false}
            />
          </div>

          {/* Next arrow */}
          <button className="modal-nav next" onClick={next}>&#8250;</button>

          {/* Counter */}
          <div className="modal-counter">{selectedIdx+1} / {total}</div>
        </div>
      )}
    </section>
  );
}

function Carousel() {
  const [current, setCurrent] = useState(0);
  const [paused, setPaused] = useState(false);
  const slides = [
    {src:'imagenes/Promo.jpeg',label:'Material Promocional',caption:'IX Congreso Internacional – Gestión Estratégica Digital'},
    {src:'imagenes/Promo_Admin.jpeg',label:'Especialidad',caption:'Administración de Empresas'},
    {src:'imagenes/Promo_Conta.jpeg',label:'Especialidad',caption:'Contaduría Pública'},
    {src:'imagenes/Promo_Merca.jpeg',label:'Especialidad',caption:'Mercadeo, RRPP y Logística'},
    {src:'imagenes/Promo_Turismo.jpeg',label:'Especialidad',caption:'Gestión del Turismo'},
  ];
  const total = slides.length;
  useEffect(() => {
    if (paused) return;
    const t = setInterval(() => setCurrent(c => (c+1)%total), 4500);
    return () => clearInterval(t);
  }, [current, paused]);
  const prev = () => setCurrent(c => (c-1+total)%total);
  const next = () => setCurrent(c => (c+1)%total);
  function getStyle(i) {
    const offset = ((i-current+total)%total);
    const norm = offset > total/2 ? offset-total : offset;
    const abs = Math.abs(norm);
    const sign = norm<0?-1:norm>0?1:0;
    if (abs===0) return {transform:'translateX(0px) translateZ(0px) rotateY(0deg) scale(1)',zIndex:10,opacity:1,filter:'brightness(1)'};
    if (abs===1) return {transform:`translateX(${sign*320}px) translateZ(-120px) rotateY(${-sign*35}deg) scale(0.82)`,zIndex:8,opacity:0.85,filter:'brightness(0.75)'};
    if (abs===2) return {transform:`translateX(${sign*560}px) translateZ(-220px) rotateY(${-sign*50}deg) scale(0.65)`,zIndex:6,opacity:0.55,filter:'brightness(0.5)'};
    return {transform:`translateX(${sign*750}px) translateZ(-300px) rotateY(${-sign*60}deg) scale(0.5)`,zIndex:4,opacity:0,filter:'brightness(0.3)'};
  }
  return (
    <section className="carousel-section">
      <div className="container">
        <FadeIn>
          <div className="section-label">// 06</div>
          <h2 className="section-title">Material <span>Promocional</span></h2>
          <div className="divider"/>
        </FadeIn>
        <FadeIn>
          <div className="carousel-3d-wrapper">
            <div className="carousel-3d-track">
              {slides.map((s,i) => {
                const style = getStyle(i);
                const isActive = i===current;
                return (
                  <div key={i} className={`carousel-3d-slide${isActive?' is-active':''}`} style={style} onClick={() => !isActive && setCurrent(i)}>
                    <img src={s.src} alt={s.caption} loading="lazy"/>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="carousel-3d-nav">
            <button className="carousel-3d-btn" onClick={prev}>&#8249;</button>
            <div className="carousel-3d-dots">
              {slides.map((_,i) => <div key={i} className={`carousel-3d-dot${i===current?' active':''}`} onClick={() => setCurrent(i)}/>)}
            </div>
            <button
              className="carousel-3d-btn"
              onClick={() => setPaused(p => !p)}
              title={paused ? 'Reanudar' : 'Pausar'}
              style={{fontSize:'1rem'}}
            >
              {paused ? '▶' : '⏸'}
            </button>
            <button className="carousel-3d-btn" onClick={next}>&#8250;</button>
          </div>
        </FadeIn>
      </div>
    </section>
  );
}

  // Manual scroll: move by ~2 items worth
  const scrollBy = (dir) => {
    const track = trackRef.current;
    if (!track) return;
    const itemW = 165; // approx item width + gap
    setOffset(prev => prev + dir * itemW * 2);
  };

  return (
    <section className="sponsors-section" id="patrocinadores">
      <div className="container">
        <FadeIn>
          <div className="section-label">// 07</div>
          <h2 className="section-title">Nuestros <span>Patrocinadores</span></h2>
          <div className="divider"/>
        </FadeIn>
        {/* Controls */}
        <div className="sponsors-controls">
          <button className="sponsors-arrow" onClick={() => scrollBy(-1)} title="Anterior">&#8249;</button>
          <button className="sponsors-pause" onClick={() => setPaused(p => !p)} title={paused ? 'Reanudar' : 'Pausar'}>
            {paused ? '▶' : '⏸'}
          </button>
          <button className="sponsors-arrow" onClick={() => scrollBy(1)} title="Siguiente">&#8250;</button>
        </div>
      </div>
      <FadeIn>
        <div className="sponsors-track-wrapper">
          <div
            ref={trackRef}
            style={{
              display:'flex', alignItems:'center', gap:'2.5rem',
              width:'max-content',
              animation: paused ? 'none' : `sponsorsScroll ${speed}s linear infinite`,
              transform: paused ? `translateX(${-Math.abs(offset) % 100}%)` : undefined,
              transition: paused ? 'transform 0.4s ease' : undefined,
            }}
          >
            {all.map((src, i) => (
              <div key={i} className="sponsor-item">
                <img
                  src={src}
                  alt={src.split('/').pop().replace(/\.[^.]+$/, '')}
                  loading="lazy"
                  onError={e => { e.target.style.display='none'; }}
                />
              </div>
            ))}
          </div>
        </div>
      </FadeIn>
      <style>{`
        @keyframes sponsorsScroll {
          0%   { transform: translateX(0); }
          100% { transform: translateX(-50%); }
        }
      `}</style>
    </section>
  );
